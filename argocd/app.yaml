apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-billing
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cuprum-acid/kube-billing-gitops
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
